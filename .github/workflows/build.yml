name: Build And Attach Executables

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os_name }} ${{ matrix.asset_arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os_name: linux
            asset_arch: x86-64
            target: x86_64-unknown-linux-gnu
            ext: ""
          - runner: ubuntu-latest
            os_name: linux
            asset_arch: avx2
            target: x86_64-unknown-linux-gnu
            ext: ""
          - runner: ubuntu-latest
            os_name: linux
            asset_arch: pext
            target: x86_64-unknown-linux-gnu
            ext: ""
          - runner: ubuntu-24.04-arm
            os_name: linux
            asset_arch: arm64
            target: aarch64-unknown-linux-gnu
            ext: ""
          - runner: windows-latest
            os_name: windows
            asset_arch: x86-64
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - runner: windows-latest
            os_name: windows
            asset_arch: avx2
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - runner: windows-latest
            os_name: windows
            asset_arch: pext
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - runner: windows-11-arm
            os_name: windows
            asset_arch: arm64
            target: aarch64-pc-windows-msvc
            ext: ".exe"
          - runner: macos-latest
            os_name: macos
            asset_arch: arm64
            target: aarch64-apple-darwin
            ext: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Rust target (fallback)
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo xtask build --arch ${{ matrix.asset_arch }} --target ${{ matrix.target }}

      - name: Prepare asset name
        id: prepare-asset
        shell: bash
        run: |
          asset_name="rarog-${{ github.event.release.tag_name }}-${{ matrix.os_name }}-${{ matrix.asset_arch }}${{ matrix.ext }}"
          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"

      - name: Upload binary to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload "${{ github.event.release.tag_name }}"
          "target/dist/${{ steps.prepare-asset.outputs.asset_name }}" --clobber
