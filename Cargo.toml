[package]
name = "lynx"
authors = ["Miloslav Macurek"]
version = "1.3.4"
edition = "2024"
description = "A UCI-compatible chess engine written in Rust"
license = "GPL-3.0-or-later"
repository = "https://github.com/maelic13/lynx"
readme = "README.md"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]

[build-dependencies]
cc = "1.0"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"

[[bench]]
name = "board"
harness = false
